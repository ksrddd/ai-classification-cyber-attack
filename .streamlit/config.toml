[theme]
# Cyber / SOC vibe -- deep slate base with cyan accent.
base                 = "dark"
primaryColor         = "#22d3ee"
backgroundColor      = "#0b1220"
secondaryBackgroundColor = "#111a2e"
textColor            = "#e2e8f0"
font                 = "sans serif"

[server]
headless             = true
runOnSave            = true
fileWatcherType      = "auto"

[browser]
gatherUsageStats     = false

[client]
toolbarMode          = "minimal"
