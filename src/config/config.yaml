# ============================================================
# Cyber Attack Classification -- runtime configuration
# All hyperparameters, paths, and class lists live here.
# Code reads via src.config.loader.load_config().
# ============================================================

project:
  name: "cyber-attack-classification"
  version: "0.2.0"
  random_state: 42

# ------------------------------------------------------------
# Classification mode
# ------------------------------------------------------------
# "binary"     -> BENIGN vs Attack
# "multiclass" -> 10-class CICIDS2017 grouping
classification:
  mode: "multiclass"

# ------------------------------------------------------------
# Data
# ------------------------------------------------------------
data:
  raw_dir:       "data/raw"
  interim_dir:   "data/interim"
  processed_dir: "data/processed"
  sample_dir:    "data/sample"

  # Target labels per mode. Must match src.config.constants.{BINARY,MULTICLASS}_LABELS.
  binary_labels:
    - "Normal"
    - "Attack"

  multiclass_labels:
    - "BENIGN"
    - "DoS"
    - "DDoS"
    - "PortScan"
    - "Bot"
    - "Web Attack"
    - "Brute Force"
    - "Infiltration"
    - "Heartbleed"
    - "Other"

  label_column: "Label"
  mapped_label_column: "Label_mapped"

  # null = load every *.csv under raw_dir. Override with an explicit list to
  # restrict the training corpus (e.g. for quick experiments).
  required_files: null

  # Drop rows whose raw label maps to "Other" before training. Useful when
  # you don't want a noisy catch-all bucket biasing the model.
  drop_other_class: false

  # Stratified row-subsample for memory-bound models (MLP, GridSearchCV).
  # Set to null to use full data. Combined dataset is ~2.8M rows so a
  # subsample is strongly recommended on a laptop.
  subsample_n: 300000

# ------------------------------------------------------------
# Preprocessing
# ------------------------------------------------------------
preprocessing:
  test_size: 0.2
  val_size: 0.2         # of (train + val); test is carved out first
  stratify: true
  drop_duplicates: true
  drop_inf: true
  drop_na: true
  scaler: "standard"    # "standard" | "minmax" | "robust"
  imbalance_strategy: "class_weight"  # "class_weight" | "smote" | "none"
  # Drop classes with fewer samples than this before splitting. Heartbleed
  # has 11 rows in full CICIDS2017 and often subsamples to <5, which breaks
  # stratified split. Set to 0 to disable.
  min_samples_per_class: 10

# ------------------------------------------------------------
# Feature selection (Phase 5)
# ------------------------------------------------------------
feature_selection:
  enabled: true
  methods:
    - "correlation"
    - "random_forest_importance"
    - "select_k_best"
    - "rfe"
  k_best: 30
  rfe_n_features: 25
  correlation_threshold: 0.95   # drop one of any pair above this
  # Which method's selected features feed the actual training pipeline.
  primary_method: "random_forest_importance"

# ------------------------------------------------------------
# Cross-validation
# ------------------------------------------------------------
cv:
  n_splits: 5
  shuffle: true
  scoring_primary: "f1_macro"
  scoring_secondary: "f1_weighted"

# ------------------------------------------------------------
# Models -- baseline hyperparameters + GridSearchCV grids
# ------------------------------------------------------------
models:
  random_forest:
    enabled: true
    baseline:
      n_estimators: 200
      max_depth: null
      min_samples_split: 2
      class_weight: "balanced"
      n_jobs: -1
    grid:
      clf__n_estimators: [100, 200, 400]
      clf__max_depth: [null, 20, 40]
      clf__min_samples_split: [2, 5]

  xgboost:
    enabled: true
    baseline:
      n_estimators: 300
      max_depth: 8
      learning_rate: 0.1
      subsample: 0.9
      colsample_bytree: 0.9
      tree_method: "hist"
      n_jobs: -1
    grid:
      clf__n_estimators: [200, 400]
      clf__max_depth: [6, 8, 10]
      clf__learning_rate: [0.05, 0.1]

  lightgbm:
    enabled: true
    baseline:
      n_estimators: 600
      num_leaves: 127
      learning_rate: 0.05
      feature_fraction: 0.9
      bagging_fraction: 0.9
      bagging_freq: 5
      min_child_samples: 20
      n_jobs: -1
    grid:
      clf__n_estimators: [400, 600, 800]
      clf__num_leaves: [63, 127, 255]
      clf__learning_rate: [0.03, 0.05, 0.1]
      clf__min_child_samples: [10, 20, 50]

  catboost:
    enabled: true
    baseline:
      iterations: 400
      depth: 8
      learning_rate: 0.05
      auto_class_weights: "Balanced"
      thread_count: -1
      verbose: 0
    grid:
      clf__iterations: [300, 500]
      clf__depth: [6, 8, 10]
      clf__learning_rate: [0.03, 0.05, 0.1]

  mlp:
    enabled: true
    baseline:
      hidden_layer_sizes: [256, 128, 64]
      activation: "relu"
      solver: "adam"
      max_iter: 500
      early_stopping: true
      validation_fraction: 0.1
      n_iter_no_change: 20
      learning_rate_init: 0.001
      alpha: 0.0001
    grid:
      clf__hidden_layer_sizes: [[128, 64], [256, 128, 64], [256, 128, 64, 32]]
      clf__alpha: [0.00001, 0.0001, 0.001]
      clf__learning_rate_init: [0.0005, 0.001, 0.005]

  logistic_regression:
    enabled: true
    baseline:
      C: 1.0
      solver: "saga"
      class_weight: "balanced"
      max_iter: 2000
      tol: 0.001
    grid:
      clf__C: [0.01, 0.1, 1.0, 10.0]
      clf__solver: ["saga"]
      clf__penalty: ["l1", "l2"]

  stacking:
    enabled: true
    baseline:
      lgbm_n_estimators: 300
      lgbm_num_leaves: 63
      lgbm_lr: 0.05
      xgb_n_estimators: 200
      xgb_max_depth: 8
      xgb_lr: 0.1
      rf_n_estimators: 200
      meta_C: 1.0
      meta_max_iter: 1000
      cv: 5
    grid: {}

# ------------------------------------------------------------
# Hyperparameter tuning
# ------------------------------------------------------------
tuning:
  enabled: true
  # "grid" = GridSearchCV; "random" = RandomizedSearchCV (cheaper on big grids)
  strategy: "random"
  random_n_iter: 30
  verbose: 1
  # Jobs for CV search on non-parallel models (lr, mlp) only.
  # Tree models ignore this and always use n_jobs=1 (they parallelise internally).
  n_jobs: 4

# ------------------------------------------------------------
# Evaluation
# ------------------------------------------------------------
evaluation:
  metrics:
    - "accuracy"
    - "precision_weighted"
    - "recall_weighted"
    - "f1_weighted"
    - "precision_macro"
    - "recall_macro"
    - "f1_macro"
    - "roc_auc"
    - "matthews_corrcoef"
  save_formats: ["csv", "png", "md"]

# ------------------------------------------------------------
# SHAP
# ------------------------------------------------------------
shap:
  # tree-based models (RF/XGB/LGBM/CatBoost) -> TreeExplainer
  # MLP -> KernelExplainer (slow, sampled)
  background_samples: 200
  analysis_samples: 1000
  top_k_features: 10

# ------------------------------------------------------------
# Dashboard
# ------------------------------------------------------------
dashboard:
  title: "AI-Based Cyber Attack Classification"
  page_icon: "shield"
  default_model: "random_forest"
  default_mode: "multiclass"

# ------------------------------------------------------------
# Logging
# ------------------------------------------------------------
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  file: "logs/pipeline.log"
